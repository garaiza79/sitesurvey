  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e2e8f0; font-family: 'Inter', system-ui, sans-serif; overflow: hidden; height: 100vh; }
    #root { height: 100vh; display: flex; flex-direction: column; }
    ::-webkit-scrollbar { width: 4px; }

    ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }

const EXPORT_FORMATS = ["GeoJSON","KML","CSV"];

const miniBtn = (bg) => ({ background:bg, border:"none", borderRadius:4, padding:"4px 8px", cursor:"pointer", fontSize:12, color:"#fff" });

function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2,5); }

function toGeoJSON(elements, lines) {
  return { type:"FeatureCollection", name:"SiteSurvey",
    crs:{ type:"name", properties:{ name:"urn:ogc:def:crs:OGC:1.3:CRS84" } },
    features: [
      ...elements.map(el => ({ type:"Feature",
        properties:{ id:el.id, tipo:el.type, label:ELEMENT_TYPES[el.type]?.label, timestamp:el.timestamp, tiene_foto:!!el.foto, ...el.attrs },
        geometry:{ type:"Point", coordinates:[el.lng, el.lat] }
      })),
      ...lines.map(ln => ({ type:"Feature",
        properties:{ id:ln.id, tipo:"linea", subtipo:ln.lineType, label:LINE_TYPES[ln.lineType]?.label, timestamp:ln.timestamp, ...ln.attrs },
        geometry:{ type:"LineString", coordinates:[[ln.from.lng,ln.from.lat],[ln.to.lng,ln.to.lat]] }
      }))
    ]
  };
}
function toKML(elements, lines) {
  const ptMarks = elements.map(el => {
    const ext = Object.entries(el.attrs||{}).map(([k,v])=>`<Data name="${k}"><value>${v}</value></Data>`).join("");
    return `<Placemark><name>${ELEMENT_TYPES[el.type]?.label} - ${el.attrs?.folio||el.id}</name><ExtendedData>${ext}</ExtendedData><Point><coordinates>${el.lng},${el.lat},0</coordinates></Point></Placemark>`;
  }).join("");
  const lnMarks = lines.map(ln =>
    `<Placemark><name>${LINE_TYPES[ln.lineType]?.label||ln.lineType}</name><LineString><coordinates>${ln.from.lng},${ln.from.lat},0 ${ln.to.lng},${ln.to.lat},0</coordinates></LineString></Placemark>`
  ).join("");
  return `<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document><name>Site Survey - Flō Networks</name>${ptMarks}${lnMarks}</Document></kml>`;
}
function toCSV(elements) {
  if (!elements.length) return "";
  const allKeys = new Set(["id","type","lat","lng","timestamp","tiene_foto"]);
  elements.forEach(el => Object.keys(el.attrs||{}).forEach(k => allKeys.add(k)));
  const headers = [...allKeys];
  const rows = elements.map(el => headers.map(h => {
    if (h==="tiene_foto") return el.foto ? "Sí" : "No";
    if (["id","type","lat","lng","timestamp"].includes(h)) return el[h]??"";
    return el.attrs?.[h]??"";
  }).map(v=>`"${String(v).replace(/"/g,'""')}"`).join(","));
  return [headers.join(","), ...rows].join("\n");
}
function downloadFile(content, filename, mime) {
  const blob = new Blob([content],{type:mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href=url; a.download=filename; a.click();
  URL.revokeObjectURL(url);
}

// ─── AI Panel ─────────────────────────────────────────────────────────────────
function AIPanel({ onAddElement, lastCoords }) {
  const [prompt, setPrompt] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);

  async function handleAI() {
    if (!prompt.trim()) return;
    setLoading(true); setError(null); setResult(null);
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514", max_tokens:800,
          system:`Eres asistente para captura de infraestructura de telecomunicaciones. El usuario describe un elemento. Extrae tipo y atributos. Responde SOLO JSON válido sin markdown: {"type":"poste|manhole|cierre|edificio","attrs":{...}}. Default: "poste".`,
          messages:[{ role:"user", content:prompt }]
        })
      });
      const data = await res.json();
      const text = data.content?.find(b=>b.type==="text")?.text||"";
      setResult(JSON.parse(text.replace(/```json|```/g,"").trim()));
    } catch(e) { setError("No se pudo interpretar. Intenta con más detalle."); }
    setLoading(false);
  }
  function handleConfirm() {
    if (!result) return;
    onAddElement({ type:result.type, lat:lastCoords?.lat??28.6353, lng:lastCoords?.lng??-106.0889, attrs:result.attrs||{} });
    setPrompt(""); setResult(null);
  }
  return (
    <div style={{ background:"#1a1f2e", border:"1px solid #2d3550", borderRadius:8, padding:10, marginBottom:10 }}>
      <div style={{ color:"#7c8db0", fontSize:11, fontWeight:700, letterSpacing:1, marginBottom:7 }}>✨ CAPTURA CON IA</div>
      <textarea value={prompt} onChange={e=>setPrompt(e.target.value)}
        placeholder='Ej: "poste de concreto 9m, CFE, folio P-001"'
        style={{ width:"100%", background:"#0d1117", color:"#e2e8f0", border:"1px solid #2d3550", borderRadius:6, padding:8, fontSize:12, resize:"vertical", minHeight:55, boxSizing:"border-box" }} />
      <button onClick={handleAI} disabled={loading||!prompt.trim()}
        style={{ marginTop:6, width:"100%", background:loading?"#2d3550":"#4f46e5", color:"#fff", border:"none", borderRadius:6, padding:"7px 0", cursor:"pointer", fontSize:13, fontWeight:600 }}>
        {loading?"⏳ Interpretando...":"🤖 Interpretar con IA"}
      </button>
      {error && <div style={{ color:"#f87171", fontSize:12, marginTop:5 }}>{error}</div>}
      {result && (
        <div style={{ marginTop:8, background:"#0d1117", border:"1px solid #4f46e5", borderRadius:6, padding:8 }}>
          <div style={{ color:"#a5b4fc", fontSize:12, marginBottom:5 }}>📍 <strong>{ELEMENT_TYPES[result.type]?.label}</strong></div>
          <div style={{ fontSize:11, color:"#94a3b8" }}>{Object.entries(result.attrs||{}).map(([k,v]) => <div key={k}><span style={{ color:"#7c8db0" }}>{k}:</span> {String(v)}</div>)}</div>
          <button onClick={handleConfirm} style={{ marginTop:7, width:"100%", background:"#059669", color:"#fff", border:"none", borderRadius:6, padding:"7px 0", cursor:"pointer", fontSize:13, fontWeight:600 }}>✅ Agregar al mapa</button>
        </div>
      )}
    </div>
  );
}

// ─── Element Form ─────────────────────────────────────────────────────────────
function ElementForm({ type, onSave, onCancel, initial={} }) {
  const def = ELEMENT_TYPES[type];
  const [vals, setVals] = useState(() => {
    const v = {}; def.fields.forEach(f => v[f.key] = initial[f.key] ?? (f.type==="boolean"?false:"")); return v;
  });
  const [photo, setPhoto] = useState(initial.foto || null);
  const fileRef = useRef(null);
  const set = (k,v) => setVals(p=>({...p,[k]:v}));

  function handlePhoto(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }
  return (
    <div>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:10 }}>
        <span style={{ fontSize:20 }}>{def.icon}</span>
        <span style={{ color:"#e2e8f0", fontWeight:700, fontSize:14 }}>{def.label}</span>
      </div>
      <div style={{ maxHeight:300, overflowY:"auto", paddingRight:4 }}>
        {def.fields.map(f => (
          <div key={f.key} style={{ marginBottom:7 }}>
            <label style={{ color:"#94a3b8", fontSize:11, display:"block", marginBottom:2 }}>{f.label}</label>
            {f.type==="text"     && <input value={vals[f.key]} onChange={e=>set(f.key,e.target.value)} style={inputStyle} />}
            {f.type==="number"   && <input type="number" value={vals[f.key]} onChange={e=>set(f.key,e.target.value)} style={inputStyle} />}
            {f.type==="textarea" && <textarea value={vals[f.key]} onChange={e=>set(f.key,e.target.value)} style={{...inputStyle,minHeight:50,resize:"vertical"}} />}
            {f.type==="select"   && <select value={vals[f.key]} onChange={e=>set(f.key,e.target.value)} style={inputStyle}><option value="">-- Seleccionar --</option>{f.options.map(o=><option key={o} value={o}>{o}</option>)}</select>}
            {f.type==="boolean"  && <label style={{ display:"flex", alignItems:"center", gap:6, cursor:"pointer" }}><input type="checkbox" checked={!!vals[f.key]} onChange={e=>set(f.key,e.target.checked)} /><span style={{ color:"#e2e8f0", fontSize:13 }}>{vals[f.key]?"Sí":"No"}</span></label>}
          </div>
        ))}
        <div style={{ marginBottom:7 }}>
          <label style={{ color:"#94a3b8", fontSize:11, display:"block", marginBottom:2 }}>📷 Foto</label>
          <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhoto} style={{ display:"none" }} />
          <button onClick={()=>fileRef.current.click()}
            style={{ width:"100%", background:"#1f2937", color:"#94a3b8", border:"1px solid #374151", borderRadius:6, padding:"7px 0", cursor:"pointer", fontSize:12 }}>
            {photo ? "📷 Cambiar foto" : "📷 Tomar / adjuntar foto"}
          </button>
          {photo && <img src={photo} alt="preview" className="photo-thumb" />}
        </div>
      </div>
      <div style={{ display:"flex", gap:8, marginTop:10 }}>
        <button onClick={()=>onSave({...vals, _foto: photo})} style={{ flex:1, background:"#059669", color:"#fff", border:"none", borderRadius:6, padding:"8px 0", cursor:"pointer", fontWeight:600 }}>💾 Guardar</button>
        <button onClick={onCancel} style={{ flex:1, background:"#374151", color:"#e2e8f0", border:"none", borderRadius:6, padding:"8px 0", cursor:"pointer" }}>Cancelar</button>
      </div>
    </div>
  );
}

  const markersRef = useRef({});
  const linesRef   = useRef({});
  const userMarker = useRef(null);
  const pinMarker  = useRef(null);
  const hasPanned  = useRef(false);

  useEffect(() => {
    if (leafletMap.current) return;
    const map = L.map(mapRef.current, { zoomControl:true }).setView([28.6353, -106.0889], 14);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution:"© OpenStreetMap contributors", maxZoom:19
    }).addTo(map);
    map.on("click", e => onMapClick(e.latlng));
    leafletMap.current = map;
  }, []);

  // GPS dot
  useEffect(() => {
    if (!leafletMap.current || !userPos) return;
    const icon = L.divIcon({
      html:`<div style="width:18px;height:18px;background:#3b82f6;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 6px rgba(59,130,246,0.25)"></div>`,
      className:"", iconSize:[18,18], iconAnchor:[9,9]
    });
    if (userMarker.current) { userMarker.current.setLatLng([userPos.lat, userPos.lng]); }
    else {
      userMarker.current = L.marker([userPos.lat, userPos.lng], { icon, zIndexOffset:1000 })
        .addTo(leafletMap.current).bindPopup(`📍 GPS ±${Math.round(userPos.acc)}m`);
    }
    if (!hasPanned.current) { leafletMap.current.setView([userPos.lat, userPos.lng], 17); hasPanned.current = true; }
  }, [userPos]);

  // Pending pin — coords label above the pin, not on top
  useEffect(() => {
    if (!leafletMap.current) return;
    if (pinMarker.current) { pinMarker.current.remove(); pinMarker.current = null; }
    if (!pendingCoords) return;
    const icon = L.divIcon({
      html:`<div style="display:flex;flex-direction:column;align-items:center;pointer-events:none">
        <div style="background:#111827;color:#facc15;font-size:10px;padding:2px 7px;border-radius:5px;white-space:nowrap;margin-bottom:3px;border:1px solid #facc15;font-weight:600">
          ${pendingCoords.lat.toFixed(5)}, ${pendingCoords.lng.toFixed(5)}
        </div>
        <div style="width:20px;height:20px;background:#facc15;border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.6)"></div>
        <div style="width:2px;height:10px;background:#facc15;margin-top:-1px"></div>
      </div>`,
      className:"", iconSize:[140,52], iconAnchor:[70,52]
    });
    pinMarker.current = L.marker([pendingCoords.lat, pendingCoords.lng], { icon, zIndexOffset:900, interactive:false })
      .addTo(leafletMap.current);
  }, [pendingCoords]);

  // Element markers
  useEffect(() => {
    if (!leafletMap.current) return;
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};
    elements.forEach(el => {
      if (!visibleTypes.includes(el.type)) return;
      const def = ELEMENT_TYPES[el.type];
      const isSel = el.id === selectedId;
      const isFrom = el.id === lineModeFrom;
      const size = isSel ? 32 : 26;
      const border = isFrom ? "3px solid #fbbf24" : isSel ? "3px solid #fff" : "2px solid rgba(255,255,255,0.5)";
      const isNew = el.attrs?.condicion === "Nuevo a Instalar";
      const icon = L.divIcon({
        html:`<div style="position:relative">
          <div style="background:${def.color};width:${size}px;height:${size}px;border-radius:50%;border:${border};display:flex;align-items:center;justify-content:center;font-size:${isSel?16:13}px;box-shadow:0 2px 8px rgba(0,0,0,0.6)">${def.icon}</div>
          ${isNew?`<div style="position:absolute;top:-5px;right:-5px;background:#22c55e;color:#fff;font-size:8px;font-weight:800;border-radius:3px;padding:1px 3px;line-height:1">NEW</div>`:""}
          ${lineMode&&!isFrom?`<div style="position:absolute;inset:0;border-radius:50%;border:2px solid #fbbf24;opacity:0.6"></div>`:""}
        </div>`,
        className:"", iconSize:[size,size], iconAnchor:[size/2,size/2]
      });
      const popup = `<b>${def.label}</b>${el.attrs?.condicion?` <small style="color:${el.attrs.condicion==="Nuevo a Instalar"?"#22c55e":"#94a3b8"}">(${el.attrs.condicion})</small>`:""}<br/>${el.attrs?.folio||el.id}<br/><small>${el.lat.toFixed(6)}, ${el.lng.toFixed(6)}</small>${el.foto?`<br/><img src="${el.foto}" style="width:110px;margin-top:4px;border-radius:4px">`:""}`;
      const m = L.marker([el.lat,el.lng],{icon}).addTo(leafletMap.current).bindPopup(popup, { offset:[0,-size/2] });
      m.on("click", e => { L.DomEvent.stopPropagation(e); lineMode ? onSelectForLine(el.id) : onSelectElement(el.id); });
      markersRef.current[el.id] = m;
    });
  }, [elements, selectedId, visibleTypes, lineMode, lineModeFrom]);

  // Lines
  useEffect(() => {
    if (!leafletMap.current) return;
    Object.values(linesRef.current).forEach(l => l.remove());
    linesRef.current = {};
    lines.forEach(ln => {
      const cfg = LINE_TYPES[ln.lineType] || LINE_TYPES.ducto;
      const opts = { color:cfg.color, weight:3, opacity:0.9, ...(cfg.dash?{dashArray:"8,5"}:{}) };
      const poly = L.polyline([[ln.from.lat,ln.from.lng],[ln.to.lat,ln.to.lng]], opts)
        .addTo(leafletMap.current)
        .bindPopup(`<b>${cfg.label}</b>${ln.attrs?.folio?`<br/>${ln.attrs.folio}`:""}`);
      linesRef.current[ln.id] = poly;
    });
  }, [lines]);

  return <div ref={mapRef} style={{ width:"100%", height:"100%" }} />;
}

// ─── Main App ─────────────────────────────────────────────────────────────────
function App() {
  const [elements,      setElements]      = useState([]);
  const [lines,         setLines]         = useState([]);
  const [pendingCoords, setPendingCoords] = useState(null);
  const [lastCoords,    setLastCoords]    = useState(null);
  const [addingType,    setAddingType]    = useState(null);
  const [selectedId,    setSelectedId]    = useState(null);
  const [editingId,     setEditingId]     = useState(null);
  const [visibleTypes,  setVisibleTypes]  = useState(Object.keys(ELEMENT_TYPES));
  const [tab,           setTab]           = useState("map");
  const [exportFmt,     setExportFmt]     = useState("GeoJSON");
  const [searchQ,       setSearchQ]       = useState("");
  const [gpsActive,     setGpsActive]     = useState(false);
  const [userPos,       setUserPos]       = useState(null);
  const [gpsError,      setGpsError]      = useState(null);
  const [showGPSModal,  setShowGPSModal]  = useState(false);
  const [showDenied,    setShowDenied]    = useState(false);
  const [gpsStatus,     setGpsStatus]     = useState("idle");
  const [lineMode,      setLineMode]      = useState(false);
  const [lineFrom,      setLineFrom]      = useState(null);
  const [lineTo,        setLineTo]        = useState(null);
  const [showLineModal, setShowLineModal] = useState(false);
  const watchRef = useRef(null);

  const handleMapClick = useCallback((latlng) => {
    if (lineMode) return;
    setPendingCoords(latlng); setLastCoords(latlng); setAddingType(null);
  }, [lineMode]);

  useEffect(() => {
    if (!navigator.permissions) return;
    navigator.permissions.query({ name:"geolocation" }).then(r => {
      if (r.state === "granted") setGpsStatus("granted-idle");
      else if (r.state === "denied") setGpsStatus("denied");
      r.onchange = () => {
        if (r.state === "denied") { setGpsStatus("denied"); stopGPS(); }
        if (r.state === "granted") setGpsStatus("granted-idle");
      };
    }).catch(()=>{});
  }, []);

  function stopGPS() {
    if (watchRef.current) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; }
    setGpsActive(false); setUserPos(null);
  }
  function startWatching() {
    if (!navigator.geolocation) { setGpsError("GPS no disponible."); setGpsStatus("error"); return; }
    setGpsStatus("requesting"); setGpsError(null);
    watchRef.current = navigator.geolocation.watchPosition(
      pos => {
        const p = { lat:pos.coords.latitude, lng:pos.coords.longitude, acc:pos.coords.accuracy };
        setUserPos(p); setLastCoords(p); setGpsError(null); setGpsActive(true); setGpsStatus("active"); setShowDenied(false);
      },
      err => {
        setGpsActive(false); setGpsStatus("denied");
        if (err.code===1) { setShowDenied(true); setGpsError("Permiso denegado."); }
        else if (err.code===2) setGpsError("Señal GPS no disponible.");
        else if (err.code===3) setGpsError("Tiempo de espera agotado.");
        else setGpsError("Error de GPS.");
        if (watchRef.current) { navigator.geolocation.clearWatch(watchRef.current); watchRef.current = null; }
      },
      { enableHighAccuracy:true, maximumAge:3000, timeout:20000 }
    );
  }
  function handleGPSButtonClick() {
    if (gpsActive) { stopGPS(); setGpsStatus("idle"); return; }
    if (gpsStatus === "granted-idle") { startWatching(); return; }
    if (gpsStatus === "denied") { setShowDenied(true); return; }
    setShowGPSModal(true);
  }
  // CHANGE #1: Use GPS coords directly
  function handleCaptureGPS() {
    if (!userPos) return;
    setPendingCoords({ lat: userPos.lat, lng: userPos.lng });
    setLastCoords({ lat: userPos.lat, lng: userPos.lng });
    setAddingType(null);
  }

  function addElement(type, coords, attrsWithPhoto) {
    const { _foto, ...attrs } = attrsWithPhoto;
    const el = { id:generateId(), type, lat:coords.lat, lng:coords.lng, attrs, foto:_foto||null, timestamp:new Date().toISOString() };
    setElements(p=>[...p,el]); setPendingCoords(null); setAddingType(null); setSelectedId(el.id);
  }
  function deleteElement(id) {
    setElements(p=>p.filter(e=>e.id!==id));
    setLines(p=>p.filter(l=>l.fromId!==id&&l.toId!==id));
    setSelectedId(null);
  }
  function updateElement(id, attrsWithPhoto) {
    const { _foto, ...attrs } = attrsWithPhoto;
    setElements(p=>p.map(e=>e.id===id?{...e,attrs,foto:_foto!==undefined?_foto:e.foto}:e));
    setEditingId(null);
  }
  function handleAIAdd({ type,lat,lng,attrs }) {
    const el = { id:generateId(), type, lat, lng, attrs, foto:null, timestamp:new Date().toISOString() };
    setElements(p=>[...p,el]); setSelectedId(el.id);
  }
  function handleSelectForLine(elId) {
    if (!lineFrom) { setLineFrom(elId); }
    else if (lineFrom === elId) { setLineFrom(null); }
    else { setLineTo(elId); setShowLineModal(true); }
  }
  function handleLineConfirm(lineType, folio) {
    const fromEl = elements.find(e=>e.id===lineFrom);
    const toEl   = elements.find(e=>e.id===lineTo);
    if (!fromEl||!toEl) return;
    setLines(p=>[...p,{ id:generateId(), lineType, fromId:lineFrom, toId:lineTo,
      from:{ lat:fromEl.lat, lng:fromEl.lng }, to:{ lat:toEl.lat, lng:toEl.lng },
      attrs:{ folio }, timestamp:new Date().toISOString() }]);
    setLineFrom(null); setLineTo(null); setShowLineModal(false); setLineMode(false);
  }
  function cancelLineMode() { setLineMode(false); setLineFrom(null); setLineTo(null); setShowLineModal(false); }

  function handleExport() {
    const ts = new Date().toISOString().slice(0,10);
    if (exportFmt==="GeoJSON") downloadFile(JSON.stringify(toGeoJSON(elements,lines),null,2), `survey_${ts}.geojson`, "application/geo+json");
    if (exportFmt==="KML")     downloadFile(toKML(elements,lines), `survey_${ts}.kml`, "application/vnd.google-earth.kml+xml");
    if (exportFmt==="CSV")     downloadFile(toCSV(elements), `survey_${ts}.csv`, "text/csv");
  }

  const gpsLabel  = { idle:"📍 GPS","granted-idle":"📍 GPS",requesting:"⏳ GPS...",active:"🟢 GPS",denied:"🚫 GPS",error:"⚠️ GPS" }[gpsStatus]??"📍 GPS";
  const gpsBg     = { active:"#065f46",requesting:"#1a2e05",denied:"#7f1d1d",error:"#7f1d1d" }[gpsStatus]??"#1f2937";
  const gpsColor  = { active:"#34d399",requesting:"#a3e635",denied:"#fca5a5",error:"#fca5a5" }[gpsStatus]??"#9ca3af";
  const gpsBorder = { active:"#059669",requesting:"#4ade80",denied:"#ef4444",error:"#ef4444" }[gpsStatus]??"#374151";

  const selected = elements.find(e=>e.id===selectedId);
  const filtered = elements.filter(e => !searchQ ||
    Object.values(e.attrs||{}).some(v=>String(v).toLowerCase().includes(searchQ.toLowerCase())) ||
    e.type.includes(searchQ.toLowerCase()));
  const counts = Object.fromEntries(Object.keys(ELEMENT_TYPES).map(t=>[t,elements.filter(e=>e.type===t).length]));
  const fromEl = elements.find(e=>e.id===lineFrom);
  const toEl   = elements.find(e=>e.id===lineTo);

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh", background:"#0d1117", color:"#e2e8f0", overflow:"hidden" }}>

      {showGPSModal  && <GPSPermissionModal onConfirm={()=>{setShowGPSModal(false);startWatching();}} onCancel={()=>setShowGPSModal(false)} />}
      {showDenied    && <GPSDeniedModal onClose={()=>setShowDenied(false)} />}
      {showLineModal && <LineTypeModal fromEl={fromEl} toEl={toEl} onConfirm={handleLineConfirm} onCancel={cancelLineMode} />}

      {/* Header */}
      <div style={{ background:"#111827", borderBottom:"1px solid #1f2937", padding:"8px 12px", display:"flex", alignItems:"center", justifyContent:"space-between", flexShrink:0, gap:6 }}>
        <div>
          <div style={{ fontSize:13, fontWeight:800, color:"#60a5fa" }}>📡 Flō Site Survey</div>
          <div style={{ fontSize:10, color:"#4b5563" }}>{elements.length} elem · {lines.length} conex</div>
        </div>
        <div style={{ display:"flex", gap:5, flexWrap:"wrap", justifyContent:"flex-end" }}>
          {gpsStatus==="active" && (
            <button onClick={handleCaptureGPS}
              style={{ background:"#064e3b", color:"#34d399", border:"1px solid #059669", borderRadius:6, padding:"5px 9px", cursor:"pointer", fontSize:11, fontWeight:700 }}>
              📌 Capturar
            </button>
          )}
          <button onClick={()=>{ lineMode?cancelLineMode():(setLineMode(true),setPendingCoords(null),setAddingType(null)); }}
            className={lineMode?"line-mode-active":""}
            style={{ background:lineMode?"#78350f":"#1f2937", color:lineMode?"#fbbf24":"#9ca3af", border:`1px solid ${lineMode?"#fbbf24":"#374151"}`, borderRadius:6, padding:"5px 9px", cursor:"pointer", fontSize:11, fontWeight:700 }}>
            {lineMode?"✕ Línea":"🔗 Línea"}
          </button>
          <button onClick={handleGPSButtonClick}
            style={{ background:gpsBg, color:gpsColor, border:`1px solid ${gpsBorder}`, borderRadius:6, padding:"5px 9px", cursor:"pointer", fontSize:11, fontWeight:700, minWidth:72 }}>
            {gpsLabel}
          </button>
        </div>
      </div>

      {/* Status bars */}
      {lineMode && <div style={{ background:"#78350f", color:"#fbbf24", fontSize:11, padding:"5px 14px", flexShrink:0 }}>
        🔗 {!lineFrom ? "Toca el primer elemento en el mapa" : `Desde: ${fromEl?.attrs?.folio||lineFrom.slice(0,6)} → Toca el segundo elemento`}
      </div>}
      {gpsStatus==="requesting" && <div style={{ background:"#1a2e05", color:"#a3e635", fontSize:11, padding:"4px 14px", flexShrink:0 }}>🛰️ Solicitando permiso GPS…</div>}
      {gpsStatus==="active" && userPos && (
        <div style={{ background:"#064e3b", color:"#6ee7b7", fontSize:10, padding:"3px 14px", flexShrink:0, display:"flex", justifyContent:"space-between" }}>
          <span>📍 {userPos.lat.toFixed(6)}, {userPos.lng.toFixed(6)}</span>
          <span>±{Math.round(userPos.acc)}m</span>
        </div>
      )}
      {gpsError && gpsStatus!=="denied" && <div style={{ background:"#7f1d1d", color:"#fca5a5", fontSize:11, padding:"4px 14px", flexShrink:0 }}>⚠️ {gpsError}</div>}

      {/* Main layout */}
      <div style={{ display:"flex", flex:1, overflow:"hidden" }}>

        {/* Left Panel */}
        <div className="left-panel" style={{ width:280, minWidth:280, background:"#111827", display:"flex", flexDirection:"column", borderRight:"1px solid #1f2937", overflow:"hidden" }}>
          <div style={{ display:"flex", borderBottom:"1px solid #1f2937", flexShrink:0 }}>
            {[["map","🗺️ Mapa"],["list","📋 Lista"],["export","📤 Export"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{ flex:1, padding:"8px 0", background:tab===k?"#1f2937":"transparent", color:tab===k?"#60a5fa":"#6b7280", border:"none", cursor:"pointer", fontSize:11, fontWeight:600 }}>{l}</button>
            ))}
          </div>

          <div style={{ flex:1, overflowY:"auto", padding:10 }}>

            {tab==="map" && <>
              <AIPanel onAddElement={handleAIAdd} lastCoords={lastCoords} />

              {/* GPS capture shortcut button */}
              {gpsStatus==="active" && !pendingCoords && !addingType && !lineMode && (
                <button onClick={handleCaptureGPS}
                  style={{ width:"100%", marginBottom:10, background:"#064e3b", color:"#34d399", border:"1px solid #059669", borderRadius:8, padding:"9px 0", cursor:"pointer", fontSize:13, fontWeight:700 }}>
                  📌 Usar mi ubicación GPS actual
                </button>
              )}

              {/* Type selector — landscape-friendly grid */}
              {pendingCoords && !addingType && (
                <div>
                  <div style={{ color:"#a3e635", fontSize:11, marginBottom:7, background:"#1a2e05", borderRadius:6, padding:"5px 10px" }}>
                    📌 {pendingCoords.lat.toFixed(5)}, {pendingCoords.lng.toFixed(5)}
                  </div>
                  <div style={{ color:"#94a3b8", fontSize:11, marginBottom:6 }}>Tipo de elemento:</div>
                  <div className="type-grid">
                    {Object.entries(ELEMENT_TYPES).map(([k,v])=>(
                      <button key={k} onClick={()=>setAddingType(k)}
                        style={{ background:"#1f2937", border:"1px solid #374151", borderRadius:8, padding:"10px 6px", cursor:"pointer", color:"#e2e8f0", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
                        <span style={{ fontSize:22 }}>{v.icon}</span>
                        <span style={{ fontSize:11 }}>{v.label}</span>
                      </button>
                    ))}
                  </div>
                  <button onClick={()=>{setPendingCoords(null);setAddingType(null);}}
                    style={{ width:"100%", marginTop:8, background:"#1f2937", color:"#6b7280", border:"1px solid #374151", borderRadius:6, padding:"6px 0", cursor:"pointer", fontSize:12 }}>✕ Cancelar</button>
                </div>
              )}

              {!pendingCoords && !addingType && (
                <div style={{ color:"#374151", fontSize:12, textAlign:"center", padding:"14px 0", border:"1px dashed #1f2937", borderRadius:8 }}>
                  {lineMode ? "🔗 Toca un elemento en el mapa" : "👆 Toca el mapa · o usa el botón GPS"}
                </div>
              )}

              {addingType && pendingCoords && (
                <div style={{ marginTop:8, background:"#0d1117", border:"1px solid #374151", borderRadius:8, padding:10 }}>
                  <ElementForm type={addingType} onSave={attrs=>addElement(addingType,pendingCoords,attrs)} onCancel={()=>{setAddingType(null);setPendingCoords(null);}} />
                </div>
              )}

              {selected && !addingType && (
                <div style={{ marginTop:8, background:"#0d1117", border:"1px solid #374151", borderRadius:8, padding:10 }}>
                  {editingId===selected.id ? (
                    <ElementForm type={selected.type} initial={{...selected.attrs, foto:selected.foto}} onSave={attrs=>updateElement(selected.id,attrs)} onCancel={()=>setEditingId(null)} />
                  ) : (
                    <>
                      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:6 }}>
                        <span style={{ fontWeight:700, color:"#e2e8f0", fontSize:13 }}>{ELEMENT_TYPES[selected.type]?.icon} {ELEMENT_TYPES[selected.type]?.label}</span>
                        <div style={{ display:"flex", gap:4 }}>
                          <button onClick={()=>setEditingId(selected.id)} style={miniBtn("#1d4ed8")}>✏️</button>
                          <button onClick={()=>deleteElement(selected.id)} style={miniBtn("#991b1b")}>🗑️</button>
                        </div>
                      </div>
                      {selected.attrs?.condicion && (
                        <span style={{ fontSize:10, background:selected.attrs.condicion==="Nuevo a Instalar"?"#14532d":"#1f2937", color:selected.attrs.condicion==="Nuevo a Instalar"?"#86efac":"#94a3b8", borderRadius:4, padding:"2px 7px", display:"inline-block", marginBottom:5 }}>
                          {selected.attrs.condicion}
                        </span>
                      )}
                      <div style={{ fontSize:10, color:"#7c8db0", marginBottom:4 }}>{selected.lat.toFixed(6)}, {selected.lng.toFixed(6)}</div>
                      {Object.entries(selected.attrs||{}).filter(([k,v])=>v!==""&&v!==false&&k!=="condicion").map(([k,v])=>(
                        <div key={k} style={{ fontSize:11, color:"#94a3b8", marginBottom:2 }}><span style={{ color:"#4b5563" }}>{k}:</span> {String(v)}</div>
                      ))}
                      {selected.foto && <img src={selected.foto} alt="foto" className="photo-thumb" />}
                      <div style={{ fontSize:10, color:"#374151", marginTop:5 }}>{selected.timestamp}</div>
                    </>
                  )}
                </div>
              )}

              {/* Layer toggles */}
              <div style={{ marginTop:12 }}>
                <div style={{ color:"#4b5563", fontSize:10, fontWeight:700, letterSpacing:1, marginBottom:5 }}>CAPAS</div>
                {Object.entries(ELEMENT_TYPES).map(([k,v])=>(
                  <div key={k} onClick={()=>setVisibleTypes(p=>p.includes(k)?p.filter(x=>x!==k):[...p,k])}
                    style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", borderRadius:6, cursor:"pointer", background:visibleTypes.includes(k)?"#1f2937":"transparent", marginBottom:2 }}>
                    <span style={{ width:11, height:11, borderRadius:"50%", background:visibleTypes.includes(k)?v.color:"#374151", display:"inline-block", flexShrink:0 }} />
                    <span style={{ fontSize:12, color:visibleTypes.includes(k)?"#e2e8f0":"#4b5563" }}>{v.label}</span>
                    <span style={{ marginLeft:"auto", fontSize:11, color:"#4b5563" }}>{counts[k]}</span>
                  </div>
                ))}
                {Object.entries(LINE_TYPES).map(([k,v]) => {
                  const cnt = lines.filter(l=>l.lineType===k).length;
                  if (!cnt) return null;
                  return <div key={k} style={{ display:"flex", alignItems:"center", gap:8, padding:"4px 6px", marginBottom:2 }}>
                    <div style={{ width:20, height:2, background:v.color, flexShrink:0 }} />
                    <span style={{ fontSize:11, color:"#6b7280" }}>{v.label}</span>
                    <span style={{ marginLeft:"auto", fontSize:11, color:"#4b5563" }}>{cnt}</span>
                  </div>;
                })}
              </div>
            </>}

            {tab==="list" && <>
              <input value={searchQ} onChange={e=>setSearchQ(e.target.value)} placeholder="🔍 Buscar folio, notas..." style={{...inputStyle,marginBottom:10}} />
              <div style={{ color:"#4b5563", fontSize:11, marginBottom:8 }}>{filtered.length} elemento(s)</div>
              {filtered.length===0 && <div style={{ color:"#374151", fontSize:12, textAlign:"center", padding:20 }}>Sin elementos capturados</div>}
              {filtered.map(el=>(
                <div key={el.id} onClick={()=>{setSelectedId(el.id);setTab("map");}}
                  style={{ background:"#0d1117", border:`1px solid ${el.id===selectedId?"#4f46e5":"#1f2937"}`, borderRadius:6, padding:"8px 10px", marginBottom:5, cursor:"pointer" }}>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ fontSize:13, fontWeight:600 }}>{ELEMENT_TYPES[el.type]?.icon} {ELEMENT_TYPES[el.type]?.label}</span>
                    <span style={{ fontSize:10, color:"#4b5563" }}>{el.attrs?.folio||el.id.slice(0,8)}</span>
                  </div>
                  <div style={{ fontSize:11, color:"#4b5563", marginTop:2 }}>{el.lat.toFixed(5)}, {el.lng.toFixed(5)}</div>
                  <div style={{ display:"flex", gap:4, marginTop:3, flexWrap:"wrap" }}>
                    {el.attrs?.estado && <span style={{ fontSize:10, background:"#1f2937", borderRadius:4, padding:"1px 5px", color:"#94a3b8" }}>{el.attrs.estado}</span>}
                    {el.attrs?.condicion && <span style={{ fontSize:10, background:el.attrs.condicion==="Nuevo a Instalar"?"#14532d":"#1f2937", borderRadius:4, padding:"1px 5px", color:el.attrs.condicion==="Nuevo a Instalar"?"#86efac":"#94a3b8" }}>{el.attrs.condicion}</span>}
                    {el.foto && <span style={{ fontSize:10, background:"#1e3a5f", borderRadius:4, padding:"1px 5px", color:"#93c5fd" }}>📷</span>}
                  </div>
                </div>
              ))}
            </>}

            {tab==="export" && <>
              <div style={{ background:"#0d1117", border:"1px solid #1f2937", borderRadius:8, padding:12, marginBottom:12 }}>
                <div style={{ color:"#7c8db0", fontSize:11, fontWeight:700, marginBottom:8 }}>RESUMEN</div>
                {Object.entries(ELEMENT_TYPES).map(([k,v])=>counts[k]>0&&(
                  <div key={k} style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#94a3b8", marginBottom:3 }}>
                    <span>{v.icon} {v.label}</span><span style={{ color:"#60a5fa", fontWeight:700 }}>{counts[k]}</span>
                  </div>
                ))}
                {lines.length>0 && <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#94a3b8", marginBottom:3 }}><span>🔗 Conexiones</span><span style={{ color:"#fbbf24", fontWeight:700 }}>{lines.length}</span></div>}
                {elements.length===0 && <div style={{ color:"#374151", fontSize:12 }}>Sin elementos aún</div>}
              </div>
              <div style={{ color:"#4b5563", fontSize:11, marginBottom:8, fontWeight:700, letterSpacing:1 }}>FORMATO</div>
              {EXPORT_FORMATS.map(f=>(
                <div key={f} onClick={()=>setExportFmt(f)}
                  style={{ display:"flex", alignItems:"center", gap:8, padding:"8px 10px", borderRadius:6, cursor:"pointer", background:exportFmt===f?"#1f2937":"transparent", marginBottom:4, border:`1px solid ${exportFmt===f?"#4f46e5":"transparent"}` }}>
                  <span style={{ width:13, height:13, borderRadius:"50%", border:`2px solid ${exportFmt===f?"#4f46e5":"#374151"}`, background:exportFmt===f?"#4f46e5":"transparent", flexShrink:0 }} />
                  <div>
                    <div style={{ fontSize:13, fontWeight:600, color:exportFmt===f?"#a5b4fc":"#e2e8f0" }}>{f}</div>
                    <div style={{ fontSize:10, color:"#4b5563" }}>{{GeoJSON:"QGIS · ArcGIS · PostGIS",KML:"Google Earth · Maps",CSV:"Excel · ClicData"}[f]}</div>
                  </div>
                </div>
              ))}
              <button onClick={handleExport} disabled={elements.length===0}
                style={{ width:"100%", marginTop:12, background:elements.length?"#4f46e5":"#1f2937", color:elements.length?"#fff":"#4b5563", border:"none", borderRadius:8, padding:"10px 0", cursor:elements.length?"pointer":"default", fontSize:14, fontWeight:700 }}>
                ⬇️ Descargar {exportFmt}
              </button>
            </>}
          </div>
        </div>

        {/* Map */}
        <div style={{ flex:1, position:"relative" }}>
          <MapView
            elements={elements} lines={lines}
            onMapClick={handleMapClick}
            selectedId={selectedId}
            onSelectElement={id=>{setSelectedId(id);setEditingId(null);}}
            visibleTypes={visibleTypes}
            userPos={userPos} pendingCoords={pendingCoords}
            lineMode={lineMode} lineModeFrom={lineFrom}
            onSelectForLine={handleSelectForLine}
          />
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
